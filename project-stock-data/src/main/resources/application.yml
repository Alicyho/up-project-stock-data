spring:
  application:
    name: stock-data-service

  # 資料庫連線設定
  # 優先順序：SPRING_DATASOURCE_* > DATABASE_URL / PG*（Railway 自動注入）> 本機預設
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stock_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Admin12345}

  # JPA 設定
  jpa:
    hibernate:
      ddl-auto: none              # 表格已存在，不要讓 Hibernate 自動改結構
    show-sql: true                # 在 console 顯示執行的 SQL（方便學習）
    properties:
      hibernate:
        format_sql: true
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        globally_quoted_identifiers: true
        globally_quoted_identifiers_skip_column_definitions: true

# 伺服器設定（Railway 會注入 PORT 環境變數）
server:
  port: ${PORT:8080}

# Finnhub 公司資料 API 設定
# 申請免費 key：https://finnhub.io/  → Dashboard 取得 API Key
# 用環境變數覆寫即可：export FINNHUB_API_KEY=你的key
# 若留空，後端會自動退回使用資料庫的基本資料（logo/country/ipo 等會是空值）
finnhub:
  api-key: ${FINNHUB_API_KEY:}
  base-url: https://finnhub.io/api/v1